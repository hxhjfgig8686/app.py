<!DOCTYPE html>
<html>
<head>
<style>
body {background:#0f172a;color:white;font-family:Arial;text-align:center}
.box {display:inline-block;width:200px;margin:10px;padding:20px;background:#1e293b;border-radius:10px}
.card {background:#1e293b;margin:10px;padding:15px;border-radius:10px}
button {padding:10px;border:none;background:#22c55e;color:white}
</style>
</head>
<body>

<h1>DARK SMS API 💚</h1>

<div class="box">📊 {{ total }}<br>إجمالي الرسائل</div>
<div class="box">🔑 {{ keys }}<br>API Keys</div>
<div class="box">📱 {{ numbers }}<br>أرقام</div>

<h2>إنشاء API Key</h2>

<form method="POST" action="/create_key">
<input name="name" placeholder="اسم المفتاح">
<button>إنشاء</button>
</form>

<h2>الرسائل</h2>

{% for m in messages_data %}
<div class="card">
<p>{{ m.msg }}</p>
<p>🔐 {{ m.otp }}</p>
</div>
{% endfor %}

</body>
</html>
